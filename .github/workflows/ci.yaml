name: CI

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'
    tags:
    # semver tags
    - 'v[0-9]+\.[0-9]+\.[0-9]+-?**'
  pull_request: {}

jobs:

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04
        - os: ubuntu-24.04-arm
        - os: macos-26
        - os: macos-26-intel
        - with:
            version: latest
        - with:
            version: v0.20.0
        - with:
            version: main
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: stable
    - uses: ./
      with: ${{ matrix.with || fromJson('{}') }}
    - name: crane version
      run: |
        set -euo pipefail

        echo "installed to: $( which crane )"
        echo "crane version: $( crane version )"
